version: 2
updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "06:00"
      timezone: Etc/UTC
    open-pull-requests-limit: 5
    groups:
      pi-dev-dependencies:
        patterns:
          - "@earendil-works/*"
      npm-development-dependencies:
        dependency-type: development
        patterns:
          - "*"
        exclude-patterns:
          - "@earendil-works/*"
    commit-message:
      prefix: chore
      include: scope

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "06:15"
      timezone: Etc/UTC
    open-pull-requests-limit: 3
    commit-message:
      prefix: chore
      include: scope
